name: Release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  build-and-publish:
    runs-on: windows-latest
    permissions:
      contents: write
    env:
      EVS_ACCOUNT_NAME: ${{ secrets.EVS_ACCOUNT_NAME }}
      EVS_PASSWD: ${{ secrets.EVS_ACCOUNT_PASSWORD }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: npm ci

      # The castLabs Widevine-enabled Electron fork has no postinstall hook (unlike
      # vanilla electron), so the binary needs an explicit download step.
      - name: Download Electron (castLabs Widevine build)
        run: node node_modules/electron/install.js

      - run: npm run typecheck

      # Caches an EVS session token on this runner so scripts/vmp-sign.js (an
      # electron-builder afterSign hook) can sign the packaged app without
      # re-authenticating itself. --no-ask is a global flag on account.py, so it
      # must come BEFORE the reauth subcommand, not after — confirmed via
      # `python -m castlabs_evs.account -h` after guessing wrong once.
      - name: Authenticate with castLabs EVS
        run: |
          pip install --upgrade castlabs-evs
          python -m castlabs_evs.account --no-ask reauth -A "$env:EVS_ACCOUNT_NAME" -P "$env:EVS_PASSWD"

      - name: Build and publish to GitHub Releases
        run: npx electron-vite build && npx electron-builder --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
